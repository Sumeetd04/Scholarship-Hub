<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — Scholarship Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<div class="top-bar">
  <span>Government of India &nbsp;|&nbsp; Ministry of Electronics &amp; Information Technology</span>
  <div class="flag">
    <div class="flag-stripe" style="background:#ff8c00"></div>
    <div class="flag-stripe" style="background:#ffffff"></div>
    <div class="flag-stripe" style="background:#138808"></div>
    <span style="margin-left:6px">Digital India</span>
  </div>
</div>
<nav>
  <div class="logo">
    <a href="../index.html" style="display:flex;align-items:center;gap:14px">
      <div class="logo-icon">🎓</div>
      <div class="logo-text"><h1>Scholarship Hub</h1><p>NATIONAL SCHOLARSHIP PORTAL</p></div>
    </a>
  </div>
  <div style="flex:1;max-width:560px;margin:0 24px">
    <div class="nav-search" style="width:100%">
      <span class="nav-search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search scholarships…" style="width:100%">
    </div>
  </div>
  <a href="login.html" class="btn-apply">Login</a>
  <button id="hamburger"><span></span><span></span><span></span></button>
</nav>

<div style="padding:40px 80px;max-width:1200px;margin:0 auto">
  <div id="search-header" style="margin-bottom:28px">
    <h2 style="font-size:26px;color:var(--text-dark)">Search Results</h2>
    <p style="color:var(--text-light);margin-top:4px" id="result-count">Searching…</p>
  </div>
  <div class="listings-grid" id="results-grid">
    <div class="loading">Searching scholarships…</div>
  </div>
</div>

<footer style="background:var(--text-dark);color:rgba(255,255,255,.6);padding:24px 80px;text-align:center;font-size:13px">
  © 2025 Scholarship Hub. Government of India Initiative.
</footer>

<script src="../assets/js/api.js"></script>
<script src="../assets/js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  updateNavForUser();
  const q = new URLSearchParams(window.location.search).get('q') || '';
  const input = document.getElementById('search-input');
  input.value = q;
  input.addEventListener('keypress', e => {
    if (e.key === 'Enter' && input.value.trim()) {
      window.location.href = 'search.html?q=' + encodeURIComponent(input.value.trim());
    }
  });

  if (!q) {
    document.getElementById('result-count').textContent = 'Enter a search term above.';
    document.getElementById('results-grid').innerHTML = '<p style="color:var(--text-light);padding:40px;text-align:center">Type something in the search bar to find scholarships.</p>';
    return;
  }

  document.getElementById('search-header').querySelector('h2').textContent = `Results for "${q}"`;

  // Search across all types
  const types = ['national','international','state','private'];
  const allResults = [];
  for (const type of types) {
    const data = await apiFetch(`/scholarships?type=${type}&limit=50`);
    if (data.success && data.scholarships) {
      data.scholarships.forEach(s => {
        const searchable = `${s.title} ${s.provider} ${s.description} ${s.category} ${s.level} ${s.field}`.toLowerCase();
        if (searchable.includes(q.toLowerCase())) allResults.push(s);
      });
    }
  }

  document.getElementById('result-count').textContent = `Found ${allResults.length} scholarship${allResults.length !== 1 ? 's' : ''}`;

  if (!allResults.length) {
    document.getElementById('results-grid').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-light)">
        <div style="font-size:48px;margin-bottom:16px">🔍</div>
        <h3 style="font-size:20px;color:var(--text-mid);margin-bottom:8px">No results found</h3>
        <p>Try searching with different keywords like "SC", "merit", "UPSC", or a scholarship name.</p>
        <br><a href="../index.html" class="btn-card" style="display:inline-block;margin-top:16px;padding:10px 24px">Back to Home</a>
      </div>`;
    return;
  }

  document.getElementById('results-grid').innerHTML = allResults.map(s => `
    <div class="s-card">
      <div class="s-card-top">
        <div class="s-flag">${_typeIcon(s.type)}</div>
        <div class="s-info">
          <h4>${_esc(s.title)}</h4>
          <p class="s-sub">${_esc(s.provider)} · ${_esc(s.level || 'All Levels')}</p>
        </div>
        <span class="s-badge ${_badgeClass(s.status)}">${_badgeLabel(s.status)}</span>
      </div>
      <p class="s-desc">${_esc(s.description || '')}</p>
      <div class="s-meta">
        <span>💰 ${_esc(s.amount || 'See details')}</span>
        ${s.deadline ? `<span>📅 ${_fmtDate(s.deadline)}</span>` : ''}
        ${s.category ? `<span>👥 ${_esc(s.category)}</span>` : ''}
      </div>
      <div class="s-actions">
        <a href="${_esc(s.apply_link || 'https://scholarships.gov.in')}" target="_blank" class="btn-card">Apply Now →</a>
        <button class="btn-card-outline" onclick='openScholarshipModal(${JSON.stringify(s).replace(/'/g,"&#39;")})'>View Details</button>
      </div>
    </div>`).join('');
});
</script>
</body>
</html>
